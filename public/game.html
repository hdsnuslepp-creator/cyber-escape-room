<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRAINEE 1998 — Facility Lockdown</title>

  <link rel="stylesheet" href="css/game.css?v=5">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
</head>

<body class="game-body crt-screen cinematic">

  <div class="scanlines" aria-hidden="true"></div>
  <div class="crt-vignette" aria-hidden="true"></div>

  <!-- Main room view: Phaser mounts the canvas here -->
  <div id="game-canvas-wrap" tabindex="0" aria-label="Game canvas — click here then use WASD or arrow keys to move"></div>

  <!-- Fixed DOM overlay -->
  <div id="facility-ui">

    <div class="facility-topbar">
      <span class="ftb-title">TRAINEE 1998 — FACILITY LOCKDOWN</span>
      <a class="ftb-sim" href="index.html">[ SIM MODE ]</a>
    </div>

    <div class="facility-right">
      <section class="hud-panel hud-map">
        <h2>FACILITY MAP</h2>
        <div class="map-grid" id="mapGrid"></div>
      </section>

      <section class="hud-panel hud-objective">
        <h2>OBJECTIVE</h2>
        <p id="objectiveText">Initialize breach at the LOGIN terminal (Sector 1 — INBOX)</p>
      </section>

      <section class="hud-panel hud-hotkeys">
        <h2>HOTKEYS</h2>
        <ul>
          <li><b>WASD / Arrows</b> — Move</li>
          <li><b>E</b> — Interact</li>
          <li><b>ESC</b> — Pause</li>
        </ul>
      </section>
    </div>

    <div id="chimeraBox" class="chimera-dialogue hidden" aria-live="polite">
      <div class="chimera-id">
        <div class="chimera-name">CHIMERA</div>
        <div class="chimera-wave" id="chimeraWave" aria-hidden="true"></div>
      </div>
      <div class="chimera-body">
        <div id="chimeraText" class="chimera-text"></div>
        <div id="chimeraHint" class="chimera-hint">[ E ] to continue</div>
      </div>
    </div>

    <div class="status-strip">
      <span>STATUS: <b id="stStatus">ONLINE</b></span>
      <span>LIVES: <b id="stLives" class="st-lives">♥♥♥</b></span>
      <span>SCORE: <b id="stScore" class="st-score">1000</b></span>
      <span>KEY: <b id="stKey" class="st-key">—</b></span>
      <span>TIME: <b id="stTime">00:00:00</b></span>
    </div>

  </div>

  <audio id="chimeraVoiceIntro" src="audio/chimera-intro.mp3" preload="auto"></audio>
  <audio id="chimeraVoiceRoom1" src="audio/chimera-room1.mp3" preload="auto"></audio>

  <div id="touch-dpad" class="touch-dpad" aria-hidden="true">
    <button type="button" class="touch-dpad__up" data-dir="up" aria-label="Move up">▲</button>
    <button type="button" class="touch-dpad__left" data-dir="left" aria-label="Move left">◀</button>
    <span class="touch-dpad__mid" aria-hidden="true">+</span>
    <button type="button" class="touch-dpad__right" data-dir="right" aria-label="Move right">▶</button>
    <button type="button" class="touch-dpad__down" data-dir="down" aria-label="Move down">▼</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script src="js/profile-save.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/chimera-box.js?v=3"></script>
  <script src="js/facility-ui.js?v=4"></script>
  <script src="js/facility-atmosphere.js?v=2"></script>
  <script src="js/phaser-game.js?v=26"></script>

</body>

</html>
